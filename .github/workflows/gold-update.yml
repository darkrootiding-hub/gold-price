name: Daily Gold & Silver Price Update

on:
  schedule:
    - cron: '45 4 * * *'   # 10:30 AM NPT
    - cron: '25 5 * * *'   # 11:10 AM NPT

  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── GOLD ──
      - name: Fetch gold price and update Firebase
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: node fetch-gold.js

      # ── SILVER ──
      - name: Fetch silver price and update Firebase
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: node fetch-silver.js

      - name: Log completion
        run: echo "✅ Gold & Silver updated at $(date -u)"